name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - work

jobs:
  test-harness:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install minimal test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run repository test harness
        run: |
          pytest tests -q
